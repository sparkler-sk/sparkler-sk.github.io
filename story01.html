<!DOCTYPE HTML>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>作品ページ</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

    <script>
    $(document).ready(function() {
        var savedBg = sessionStorage.getItem('bg_style');
        if (savedBg === 'white' || (savedBg === null && $("body").attr('class').match(/white/))) {
            $("body").addClass('white').removeClass('black');
        } else {
            $("body").removeClass('white').addClass('black');
        }
        $("#BgToggle").addClass('current');
        $("#BgToggle").click(function () {
            if ($("body").hasClass('white')) {
                sessionStorage.setItem('bg_style', 'black');
                $("body").addClass('black').removeClass('white');
            } else {
                sessionStorage.setItem('bg_style', 'white');
                $("body").addClass('white').removeClass('black');
            }
        });
        var savedFont = sessionStorage.getItem('font_style') || 'gothic';
        applyFont(savedFont);
        $("#btn_font_toggle").click(function () {
            var currentFont = sessionStorage.getItem('font_style') || 'gothic';
            var nextFont = (currentFont === 'gothic') ? 'serif' : 'gothic';
            applyFont(nextFont);
        });
        function applyFont(font) {
            sessionStorage.setItem('font_style', font);
            var btn = $("#btn_font_toggle");
            btn.addClass('current');
            if (font === 'serif') {
                $("#honbun").addClass('serif').removeClass('gothic');
                btn.text('ａＡ').addClass('gothic').removeClass('serif').attr('title', 'ゴシック体へ');
            } else {
                $("#honbun").addClass('gothic').removeClass('serif');
                btn.text('ａＡ').addClass('serif').removeClass('gothic').attr('title', '明朝体へ');
            }
        }
        var savedSize = sessionStorage.getItem('font_size') || 'middle';
        applySize(savedSize);
        $("#btn_size_toggle").click(function () {
            var currentSize = sessionStorage.getItem('font_size') || 'middle';
            var nextSize = (currentSize === 'middle') ? 'large' : (currentSize === 'large' ? 'small' : 'middle');
            applySize(nextSize);
        });
        function applySize(size) {
            sessionStorage.setItem('font_size', size);
            $("#honbun").removeClass('small middle large').addClass(size);
            var btn = $("#btn_size_toggle");
            btn.addClass('current');
            if (size === 'small') { btn.text('S'); }
            else if (size === 'large') { btn.text('L'); }
            else { btn.text('M'); }
        }
    });
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style type="text/css">
        @charset "UTF-8";
        @import url('https://fonts.googleapis.com/css?family=Noto+Sans+JP|Noto+Serif+JP|Roboto&display=swap');
        
        * { padding: 0; margin: 0; box-sizing: border-box; }
        
        body { 
            text-align: justify; 
            word-break: break-word; 
            line-height: 1.7; 
            letter-spacing: 0.1em; 
            background-color: #fff; /* デフォルト背景 */
            font-size: 13px; 
            color: #000; 
            font-family: メイリオ, 'Noto Sans JP', sans-serif; 
        }

        /* サイト全体の背景 */
        body::before { 
            position: fixed; 
            display: block; 
            content: ''; 
            top: 0; left: 0; 
            z-index: -10000; 
            width: 100vw; height: 100vh; 
            background-color: #eee; /* ここが一番後ろの背景色です */
        }

        /* メインの文章枠（ここが透けます） */
        main { 
            text-align: center; 
            margin: 3rem auto; 
            padding: 1.5rem; 
            max-width: 620px; 
        }

        @media (min-width: 768px) { main { padding: 3rem; } }

        /* ★ここが重要：色の設定★ */
        .white main { background-color: rgba(255,255,255,.6); color: #000; }
        .black main { background-color: rgba(0,0,0,.6); color: #fff; }
        
        .black a { color: #fff; }

        /* ボタン */
        #novel_buttons { display: flex; justify-content: flex-end; padding-right: 10px; }
        #BgToggle, #switchFont, #switchFontSize { list-style: none; float: left; text-align: center; padding: 0 10px; border: 1px solid #eeeeee; color: #222; display: block; height: 30px; line-height: 30px; cursor: pointer; background-color: #e2e2e2; margin-bottom: 10px; }

        /* 本文 */
        #honbun { font-size: 14px; line-height: 2; letter-spacing: 0.025em; padding-top: 1em; text-align: left; }
        .small { font-size: 13px !important; }
        .middle { font-size: 14px !important; }
        .large { font-size: 18px !important; }
        .serif { font-family: 'Noto Serif JP', serif !important; }
        .gothic { font-family: メイリオ, sans-serif !important; }
        
        .back-link { text-align: center; margin-top: 30px; }
    </style>
</head>

<body id="all" class="white">
<main>

    <div id="novel_buttons">  
        <ul style="display: flex;">
            <li id="BgToggle" title="背景切替"><i class="fas fa-adjust"></i></li>
            <li id="btn_font_toggle" class="toggle-btn" style="list-style:none; margin:0 5px;" title="書体切替">ａＡ</li>
            <li id="btn_size_toggle" class="toggle-btn" style="list-style:none;" title="サイズ変更">M</li>
        </ul>
    </div>

    <div id="honbun" class="middle gothic">
        「蓮、こっち向いて」<br>
        <br>
        ここに本文を書いてください。黒モードにしても、枠がうっすら透けるはずです。
    </div>

    <div class="back-link">
        <a href="short.html">戻る</a>
    </div>

</main>
</body>
</html>

<!DOCTYPE HTML>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>作品本文</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <style type="text/css">
        /* short.html と同じ CSS を使用（省略して記述しますが、実際は同じものを貼ってください） */
        @charset "UTF-8";
        * { padding: 0; margin: 0; box-sizing: border-box; }
        body { text-align: justify; word-break: break-word; line-height: 1.7; letter-spacing: 0.1em; font-size: 13px; font-family: メイリオ, 'Noto Sans JP', sans-serif; }
        body::before { position: fixed; display: block; content: ''; top: 0; left: 0; z-index: -10000; width: 100vw; height: 100vh; background: linear-gradient(0deg, rgba(0, 0, 0, .1), rgba(0, 0, 0, .2)),url('../../bg.jpg')center/cover; }
        main { text-align: center; margin: 3rem auto; padding: 1.5rem; max-width: 620px; }
        .black main { background-color: rgba(0,0,0,.6); color: #fff; }
        .black a { color: #fff; }
        .white main { background-color: rgba(255,255,255,.6); color: #000; }
        #honbun { font-size: 14px; line-height: 2; padding: 1em 0.5em; }
        .small { font-size: 13px !important; }
        .middle { font-size: 14px !important; }
        .large { font-size: 18px !important; }
        .serif { font-family: 'Noto Serif JP', serif !important; }
        .gothic { font-family: メイリオ, sans-serif !important; }
    </style>
</head>
<body id="all">
    <script>
        document.body.className = sessionStorage.getItem('bg_style') || 'white';
    </script>
<main>
    <div class="novel">
        <div id="honbun">
            <p>ここに本文。ナノの独自タグを除いた状態で、あなたのデザインのまま表示されます。</p>
            <br>
            <a href="../../short.html">back</a>
        </div> 
    </div>
</main>
<script>
    // フォントとサイズも反映
    $(document).ready(function() {
        $("#honbun").addClass(sessionStorage.getItem('font_style') || 'gothic');
        $("#honbun").addClass(sessionStorage.getItem('font_size') || 'middle');
    });
</script>
</body>
</html>
